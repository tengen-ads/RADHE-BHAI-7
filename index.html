<div class="timer">
<div id="days">00<span>DAYS</span></div>
<div id="hours">00<span>HOURS</span></div>
<div id="minutes">00<span>MINUTES</span></div>
<div id="seconds">50<span>SECONDS</span></div>
</div>

<script>
let end = new Date();
end.setHours(end.getHours()+24);

function updateTimer(){
let now = new Date();
let diff = end-now;

if(diff<0) diff=0;

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff/(1000*60*60))%24);
let m=Math.floor((diff/(1000*60))%60);
let s=Math.floor((diff/1000)%60);

document.getElementById("days").innerHTML=
String(d).padStart(2,"0")+"<span>DAYS</span>";

document.getElementById("hours").innerHTML=
String(h).padStart(2,"0")+"<span>HOURS</span>";

document.getElementById("minutes").innerHTML=
String(m).padStart(2,"0")+"<span>MINUTES</span>";

document.getElementById("seconds").innerHTML=
String(s).padStart(2,"0")+"<span>SECONDS</span>";
}

setInterval(updateTimer,1000);
updateTimer();
</script>
